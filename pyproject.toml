[project]
name = "vscode-remote-try-django"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "django>=5.1.6",
    "django-stubs-ext>=5.1.3",
]

[dependency-groups]
dev = [
    "django-stubs[compatible-mypy]>=5.1.3",
    "ruff>=0.9.7",
]

[tool.django-stubs]

[tool.mypy]
strict = true
plugins = [
    "mypy_django_plugin.main",
]
